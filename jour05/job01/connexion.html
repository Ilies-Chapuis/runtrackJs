<!DOCTYPE html>
<html lang="fr">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Connexion</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>

        <div class="carte">
            <h1>Connexion</h1>
            <p class="sous-titre">Accédez à votre espace personnel</p>

            <form id="formConnexion" novalidate>
                <!-- novalidate désactive la validation native du navigateur, on gère tout nous-mêmes en JS -->

                <!-- Champ Email -->
                <div class="champ">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" placeholder="nom@domaine.fr"/>
                    <p class="message-erreur" id="erreur-email"></p>
                </div>

                <!-- Champ Mot de passe -->
                <div class="champ">
                    <label for="motdepasse">Mot de passe</label>
                    <input type="password" id="motdepasse" name="motdepasse" autocomplete="current-password" placeholder="••••••••"/>
                    <p class="message-erreur" id="erreur-motdepasse"></p>
                </div>

                <button type="submit">Se connecter</button>
            </form>

            <p class="lien-page">
                Pas encore de compte ? <a href="inscription.html">S'inscrire</a>
            </p>
        </div>

        <!-- On charge d'abord validation.js (les fonctions),
            puis le script de cette page qui les utilise -->
        <script src="validation.js"></script>
        <script>
            const form = document.getElementById("formConnexion");

            // Validation en temps réel (à chaque fois que l'utilisateur quitte un champ)
            document.getElementById("email").addEventListener("blur", function () {
                validerEmail(this, "erreur-email");
            });

            document.getElementById("motdepasse").addEventListener("blur", function () {
                validerMotDePasse(this, "erreur-motdepasse");
            });

            // Validation au moment de la soumission du formulaire
            form.addEventListener("submit", async function (e) {
                e.preventDefault(); // Empêche le rechargement de la page

                const emailOk = await validerEmail(document.getElementById("email"), "erreur-email");
                const mdpOk   = await validerMotDePasse(document.getElementById("motdepasse"), "erreur-motdepasse");

                if (emailOk && mdpOk) {
                    alert("Connexion réussie !");
                    // Ici on enverrait normalement les données au serveur
                }
            });
        </script>

    </body>
</html>
